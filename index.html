<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Slideshow</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe id="slideshow-frame" src=""></iframe>
    <script>
        // List of URLs for the slideshow
        const urls = [
            "https://stmodanscs.github.io/summer_of_code/3LDpNNpOyk/index.html",
            "https://stmodanscs.github.io/summer_of_code/4Yr9Y4UCB6/index.html",
            "https://stmodanscs.github.io/summer_of_code/7Qzkbcebwy/index.html",
            "https://stmodanscs.github.io/summer_of_code/7dlsGt1OsH/index.html",
            "https://stmodanscs.github.io/summer_of_code/AKmzx0Ip5z/index.html",
            "https://stmodanscs.github.io/summer_of_code/KMBHq4PPpU/index.html",
            "https://stmodanscs.github.io/summer_of_code/M2X6Co00wR/index.html",
            "https://stmodanscs.github.io/summer_of_code/Q8fv63MsRL/index.html",
            "https://stmodanscs.github.io/summer_of_code/R2sjwLN6nX/index.html",
            "https://stmodanscs.github.io/summer_of_code/S1ySsTwHnT/index.html",
            "https://stmodanscs.github.io/summer_of_code/SYavjEXAWW/index.html",
            "https://stmodanscs.github.io/summer_of_code/SxH7B5X56V/index.html",
            "https://stmodanscs.github.io/summer_of_code/VGglhuvOMB/index.html",
            "https://stmodanscs.github.io/summer_of_code/VYwGM0KhOe/index.html",
            "https://stmodanscs.github.io/summer_of_code/WHxje459m2/index.html",
            "https://stmodanscs.github.io/summer_of_code/Z2kFHTCDFQ/index.html",
            "https://stmodanscs.github.io/summer_of_code/apcU45ogVL/index.html",
            "https://stmodanscs.github.io/summer_of_code/hor8FxDeoi/index.html",
            "https://stmodanscs.github.io/summer_of_code/mHkesXffzA/index.html",
            "https://stmodanscs.github.io/summer_of_code/nCSQDCQfnU/index.html",
            "https://stmodanscs.github.io/summer_of_code/qTOrLoeaYy/index.html",
            "https://stmodanscs.github.io/summer_of_code/rCAQILl1U9/index.html",
            "https://stmodanscs.github.io/summer_of_code/v7qF3rrdnh/index.html",
            "https://stmodanscs.github.io/summer_of_code/x56yqtYfD2/index.html",
            "https://stmodanscs.github.io/summer_of_code/xaftZT6vPZ/index.html"
        ];

        let currentIndex = 0;
        const iframe = document.getElementById('slideshow-frame');
        const intervalTime = 20000; // Time in milliseconds for each slide

        // Function to load the next URL
        function loadNextUrl() {
            iframe.src = urls[currentIndex];
            currentIndex = (currentIndex + 1) % urls.length; // Cycle back to the first URL
        }

        // Start the slideshow
        loadNextUrl();
        setInterval(loadNextUrl, intervalTime);
    </script>
</body>
</html>
